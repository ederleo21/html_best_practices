<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Semántico con Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4 sm:p-6">

    <main class="w-full max-w-2xl bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">

        <header class="bg-indigo-600 p-6 sm:p-8 text-white">
            <h1 class="text-2xl sm:text-3xl font-bold flex items-center gap-3">
                <i class="fa-solid fa-user-astronaut"></i>
                Registro Profesional
            </h1>
            <p class="text-indigo-100 mt-2 text-sm sm:text-base">
                Completa el siguiente formulario para crear tu perfil. Los campos marcados con (*) son obligatorios.
            </p>
        </header>

        <form action="#" method="POST" class="p-6 sm:p-8 space-y-8">

            <fieldset class="space-y-5">
                <legend
                    class="text-lg font-semibold text-gray-800 border-b border-gray-200 pb-2 w-full flex items-center gap-2">
                    <i class="fa-regular fa-id-badge text-indigo-500"></i> Información Personal
                </legend>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

                    <div class="flex flex-col gap-1.5">
                        <label for="nombre" class="text-sm font-medium text-gray-700">
                            Nombre Completo <span class="text-red-500" aria-hidden="true">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-regular fa-user text-gray-400"></i>
                            </div>
                            <input type="text" id="nombre" name="nombre" required placeholder="Ej: Ana López"
                                class="w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all shadow-sm">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="correo" class="text-sm font-medium text-gray-700">
                            Correo Electrónico <span class="text-red-500" aria-hidden="true">*</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-regular fa-envelope text-gray-400"></i>
                            </div>
                            <input type="email" id="correo" name="correo" required placeholder="ana@ejemplo.com"
                                class="w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all shadow-sm">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="telefono" class="text-sm font-medium text-gray-700">
                            Número de Teléfono
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-phone text-gray-400"></i>
                            </div>
                            <input type="tel" id="telefono" name="telefono" placeholder="+34 600 000 000"
                                class="w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all shadow-sm">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="edad" class="text-sm font-medium text-gray-700">
                            Edad <span class="text-gray-400 font-normal ml-1">(opcional)</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-regular fa-calendar text-gray-400"></i>
                            </div>
                            <input type="number" id="edad" name="edad" min="18" max="120" placeholder="18"
                                class="w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all shadow-sm">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5 sm:col-span-2">
                        <label for="fecha_nacimiento" class="text-sm font-medium text-gray-700">
                            Fecha de Nacimiento
                        </label>
                        <div class="relative">
                            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento"
                                class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all shadow-sm">
                        </div>
                    </div>
                </div>
            </fieldset>

            <fieldset class="space-y-5">
                <legend
                    class="text-lg font-semibold text-gray-800 border-b border-gray-200 pb-2 w-full flex items-center gap-2">
                    <i class="fa-solid fa-laptop-code text-indigo-500"></i> Detalles Profesionales
                </legend>

                <div class="flex flex-col gap-1.5">
                    <label for="especialidad" class="text-sm font-medium text-gray-700">
                        Especialidad Principal <span class="text-red-500" aria-hidden="true">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-code text-gray-400"></i>
                        </div>
                        <select id="especialidad" name="especialidad" required
                            class="w-full pl-10 pr-10 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all shadow-sm appearance-none cursor-pointer">
                            <option value="" disabled selected>Selecciona una opción...</option>
                            <option value="frontend">Desarrollador Frontend</option>
                            <option value="backend">Desarrollador Backend</option>
                            <option value="fullstack">Desarrollador Fullstack</option>
                            <option value="uiux">Diseñador UI/UX</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-chevron-down text-gray-500 text-xs"></i>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="biografia" class="text-sm font-medium text-gray-700">
                        Breve Biografía
                    </label>
                    <textarea id="biografia" name="biografia" rows="4"
                        placeholder="Describe brevemente tu experiencia y habilidades principales..."
                        class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all shadow-sm resize-y"></textarea>
                </div>
            </fieldset>

            <div class="flex items-start gap-3 bg-indigo-50/50 p-4 rounded-lg border border-indigo-100">
                <div class="flex items-center h-5 mt-0.5">
                    <input type="checkbox" id="terminos" name="terminos" required
                        class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer">
                </div>
                <div class="flex flex-col">
                    <label for="terminos" class="text-sm font-semibold text-gray-800 cursor-pointer">
                        Acepto los términos y condiciones <span class="text-red-500" aria-hidden="true">*</span>
                    </label>
                    <p class="text-xs text-gray-600 mt-1">
                        Al marcar esta casilla, confirmas que has leído y aceptas nuestra política de privacidad sobre
                        el tratamiento de datos.
                    </p>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t border-gray-200">
                <button type="submit"
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition-all flex justify-center items-center gap-2 transform active:scale-[0.98]">
                    <i class="fa-solid fa-paper-plane"></i> Enviar Registro
                </button>
                <button type="reset"
                    class="px-6 py-3 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 transition-all">
                    <i class="fa-solid fa-eraser mr-2"></i> Limpiar
                </button>
            </div>

        </form>
    </main>

</body>

</html>
